name = "dicebastion-memberships"
main = "src/index.js"
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2024-10-23"

# Keep the workers.dev subdomain active for API calls from frontend JS
workers_dev = true

# Route event slug URLs through this Worker for SEO pages
# Route product slug URLs through this Worker for shop SEO pages
routes = [
  { pattern = "dicebastion.com/api/*", zone_name = "dicebastion.com" },
  { pattern = "www.dicebastion.com/api/*", zone_name = "dicebastion.com" },
  { pattern = "dicebastion.com/events/*", zone_name = "dicebastion.com" },
  { pattern = "www.dicebastion.com/events/*", zone_name = "dicebastion.com" },
  { pattern = "dicebastion.com/posts", zone_name = "dicebastion.com" },
  { pattern = "www.dicebastion.com/posts", zone_name = "dicebastion.com" },
  { pattern = "dicebastion.com/posts/*", zone_name = "dicebastion.com" },
  { pattern = "www.dicebastion.com/posts/*", zone_name = "dicebastion.com" },
  # Hugo emits pages-sitemap.xml on Pages; this path is NOT under /products/* so it needs its own route.
  { pattern = "shop.dicebastion.com/pages-sitemap.xml", zone_name = "dicebastion.com" },
  { pattern = "shop.dicebastion.com/products/*", zone_name = "dicebastion.com" }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "dicebastion"
database_id = "9abc9bae-236a-4237-aa88-78cf161ba9d1"

# R2 Object Storage
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "dicebastion-images"

# Service Bindings - Connect to payments worker
[[services]]
binding = "PAYMENTS"
service = "dicebastion-payments"

# Environment Variables (for local development)
[vars]
DEBUG = "false"
SITE_URL = "https://dicebastion.com"
PAYMENTS_WORKER_URL = "https://dicebastion-payments.ncalamaro.workers.dev"
ALLOWED_ORIGIN = "http://localhost:1313,http://localhost:1314,http://localhost:8000,https://dicebastion.com,https://www.dicebastion.com,https://shop.dicebastion.com,https://dicebastion-shop.pages.dev"
SUMUP_MERCHANT_CODE = "MUZHYEAH"
# FREE_TRIAL_SETUP_AUTH_AMOUNT — optional dev override for SumUp setup auth (defaults to plan price)
SUPPORT_CONTACT_EMAIL = "contact@dicebastion.com"
ALLOW_TEST_BYPASS = "true"
R2_PUBLIC_URL = "https://pub-631ca6f207ca4661ac9cb2ba9371ba31.r2.dev"
BUNNY_CDN_URL = "https://dicebastion.b-cdn.net"
BLOG_API_URL = "https://dicebastionblogger-yvfyf.bunny.run"
BOOKINGS_API_URL = "https://dicebastionbookings-ofbbu.bunny.run"
# Fetch Hugo-built shop XML from Pages host (avoids Worker→same-URL fetch loops on custom domain).
SHOP_PAGES_ORIGIN = "https://dicebastion-shop.pages.dev"
# IndexNow key for real-time push to Bing/Yandex/etc. Public value; the matching key file
# must be served at https://dicebastion.com/<KEY>.txt and https://shop.dicebastion.com/<KEY>.txt
INDEXNOW_KEY = "4d1ce8a5701f9b2c6e3a7d0f8b1c4e92"

# Production secrets (set via: wrangler secret put SECRET_NAME)
# - SUMUP_ACCESS_TOKEN
# - SUMUP_MERCHANT_CODE
# - MAILERSEND_API_KEY
# - ADMIN_KEY (for shop admin endpoints)
# - BGG_API_TOKEN (for BoardGameGeek API access)
# - GOOGLE_SA_KEY (Google Indexing API service account JSON)
# - BOOKING_SAME_DAY_WHATSAPP (JSON: [{"name":"Nicky","url":"https://wa.me/+34711042604"}, ...])

# Cron trigger for membership renewals (daily at 2 AM UTC)
[triggers]
crons = ["0 2 * * *"]

[observability]
enabled = true
