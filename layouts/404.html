{{ define "main" }}
  <script>
    // Redirect shareable event URLs to the events page with modal auto-open
    (function() {
      var path = window.location.pathname.replace(/\/+$/, '');
      var match = path.match(/^\/events\/([a-z0-9_][-a-z0-9_]+)$/i);
      if (match && match[1]) {
        window.location.replace('/events/?open=' + encodeURIComponent(match[1]));
      }
    })();
  </script>
  <h1 class="mb-3 text-4xl font-extrabold">{{ i18n "error.404_title" | emojify }}</h1>
  <p class="mt-8 mb-12 text-neutral-400 dark:text-neutral-500">
    {{ i18n "error.404_error" | emojify }}
  </p>
  <div class="prose dark:prose-invert">
    <p>{{ i18n "error.404_description" | emojify }}</p>
  </div>
{{ end }}
