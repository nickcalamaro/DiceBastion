# Shop Site Configuration
baseURL = "https://shop.dicebastion.com/"
languageCode = "en-gb"
title = "Dice Bastion Shop - Gibraltar Board Games, Trading Cards, and Accessories"
copyright = "© 2025 Dice Bastion"

disableKinds = ["taxonomy", "term"]

[params]
  description = "Shop board games, Magic: The Gathering (MTG), trading cards, and accessories in Gibraltar."

[markup.goldmark.renderer]
  unsafe = true

# TDewolf's JS minifier sometimes fails on large inline `<script>` blocks (e.g. admin page),
# yielding spurious "unexpected EOF" during `hugo --minify`. Keep HTML/CSS minified; skip JS.
[minify]
  disableJS = true

# Hugo’s default sitemap.xml would list only Markdown pages — products live in D1.
# Emit page URLs as pages-sitemap.xml so the root sitemap index (static/sitemap.xml) can list both.
[sitemap]
  filename = "pages-sitemap.xml"
  changefreq = "weekly"
  priority = 0.5
